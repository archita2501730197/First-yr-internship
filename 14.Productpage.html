<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Product Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
}

nav{
    background:#222;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cart{
    font-size:18px;
}

.container{
    max-width:1100px;
    margin:40px auto;
    background:white;
    border-radius:12px;
    padding:30px;
    display:flex;
    gap:40px;
    box-shadow:0 0 12px rgba(0,0,0,.15);
}

.left{
    flex:1;
}

.right{
    flex:1;
}

#mainImage{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:10px;
}

.gallery{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:15px;
}

.gallery img{
    width:80px;
    height:80px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
    border:2px solid transparent;
}

.gallery img:hover{
    border:2px solid royalblue;
    transform:scale(1.05);
}

.price{
    font-size:30px;
    color:green;
    margin:15px 0;
}

.rating{
    color:orange;
    font-size:20px;
}

.desc{
    color:#555;
    line-height:1.7;
    margin:20px 0;
}

.quantity{
    display:flex;
    align-items:center;
    gap:15px;
    margin:20px 0;
}

.quantity button{
    width:40px;
    height:40px;
    font-size:22px;
    cursor:pointer;
}

#qty{
    font-size:22px;
    font-weight:bold;
}

#addCart{
    background:#007bff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:6px;
    cursor:pointer;
    font-size:18px;
}

#addCart:hover{
    background:#0056b3;
}

#message{
    margin-top:20px;
    color:green;
    font-weight:bold;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

#mainImage{
    height:320px;
}

}
</style>

</head>
<body>

<nav>

<h2>🛍 ShopEasy</h2>

<div class="cart">
🛒 Cart :
<span id="cartCount">0</span>
</div>

</nav>

<div class="container">

<div class="left">

<img id="mainImage"
src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=700">

<div class="gallery">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=700">

<img src="https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=700">

<img src="https://images.unsplash.com/photo-1484704849700-f032a568e944?w=700">

<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd?w=700">

</div>

</div>

<div class="right">

<h1>Wireless Bluetooth Headphones</h1>

<div class="rating">
★★★★★ (4.8)
</div>

<div class="price">
₹2,499
</div>

<p class="desc">

Enjoy crystal clear sound, deep bass and up to
20 hours of battery life. Comfortable ear cushions,
Bluetooth 5.3 support and lightweight premium design.

</p>

<div class="quantity">

<button id="minus">-</button>

<span id="qty">1</span>

<button id="plus">+</button>

</div>

<button id="addCart">
Add To Cart
</button>

<div id="message"></div>

</div>

</div>

<script>

let quantity = 1;
let cart = 0;
const price = 2499;

const qty = document.getElementById("qty");
const cartCount = document.getElementById("cartCount");
const message = document.getElementById("message");

document.getElementById("plus").onclick=function(){

quantity++;
qty.innerHTML=quantity;

}

document.getElementById("minus").onclick=function(){

if(quantity>1){

quantity--;
qty.innerHTML=quantity;

}

}

document.getElementById("addCart").onclick=function(){

cart += quantity;

cartCount.innerHTML=cart;

let total=quantity*price;

message.innerHTML=
quantity+" item(s) added successfully! Total = ₹"+total;

}

const main=document.getElementById("mainImage");

const images=document.querySelectorAll(".gallery img");

images.forEach(function(image){

image.onclick=function(){

main.src=image.src;

}

});

</script>

</body>
</html>
