<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Finder</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:700px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:20px;
color:#0f172a;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:25px;
}

input{
flex:1;
padding:12px;
font-size:17px;
border:2px solid #ccc;
border-radius:8px;
outline:none;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.profile{
display:none;
}

.top{
display:flex;
gap:20px;
align-items:center;
}

.top img{
width:140px;
height:140px;
border-radius:50%;
border:4px solid #2563eb;
}

.info h2{
margin-bottom:10px;
}

.stats{
display:flex;
justify-content:space-between;
margin:20px 0;
}

.card{
background:#2563eb;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
width:30%;
}

.repo-list{
margin-top:20px;
}

.repo{
background:#f1f5f9;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.repo a{
text-decoration:none;
color:#2563eb;
font-weight:bold;
}

.error{
color:red;
text-align:center;
font-size:18px;
margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>GitHub Profile Finder</h1>

<div class="search-box">
<input type="text" id="username" placeholder="Enter GitHub Username">
<button onclick="searchUser()">Search</button>
</div>

<div id="profile" class="profile">

<div class="top">
<img id="avatar">

<div class="info">
<h2 id="name"></h2>
<p id="bio"></p>
<br>
<p><b>Username:</b> <span id="login"></span></p>
<p><b>Location:</b> <span id="location"></span></p>
</div>

</div>

<div class="stats">

<div class="card">
<h2 id="followers"></h2>
<p>Followers</p>
</div>

<div class="card">
<h2 id="following"></h2>
<p>Following</p>
</div>

<div class="card">
<h2 id="repos"></h2>
<p>Repositories</p>
</div>

</div>

<h2>Latest Repositories</h2>

<div id="repoList" class="repo-list"></div>

</div>

<div id="error" class="error"></div>

</div>

<script>

async function searchUser(){

const username=document.getElementById("username").value.trim();

const profile=document.getElementById("profile");
const error=document.getElementById("error");
const repoList=document.getElementById("repoList");

profile.style.display="none";
error.innerHTML="";
repoList.innerHTML="";

if(username===""){
error.innerHTML="Please enter a username.";
return;
}

try{

const userResponse=await fetch(`https://api.github.com/users/${username}`);

if(!userResponse.ok){
throw new Error("User not found");
}

const user=await userResponse.json();

document.getElementById("avatar").src=user.avatar_url;
document.getElementById("name").innerText=user.name || "No Name";
document.getElementById("bio").innerText=user.bio || "No Bio";
document.getElementById("login").innerText=user.login;
document.getElementById("location").innerText=user.location || "Not Available";
document.getElementById("followers").innerText=user.followers;
document.getElementById("following").innerText=user.following;
document.getElementById("repos").innerText=user.public_repos;

const repoResponse=await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);

const repos=await repoResponse.json();

repos.slice(0,5).forEach(repo=>{

repoList.innerHTML+=`
<div class="repo">
<a href="${repo.html_url}" target="_blank">${repo.name}</a>
<p>⭐ ${repo.stargazers_count} | 🍴 ${repo.forks_count}</p>
</div>
`;

});

profile.style.display="block";

}

catch(e){

error.innerHTML="GitHub user not found.";

}

}

</script>

</body>
</html>
