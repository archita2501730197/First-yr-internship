<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .box {
      width: 350px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    h2 {
      text-align: center;
    }

    .balance {
      text-align: center;
      font-size: 20px;
      margin: 10px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    .card {
      width: 45%;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
    }

    .income {
      background: #d6ffd6;
    }

    .expense {
      background: #ffd6d6;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      margin-top: 5px;
      background: #eee;
      border-right: 5px solid green;
    }

    li.minus {
      border-right: 5px solid red;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Expense Tracker</h2>

  <div class="balance">
    Balance: ₹<span id="balance">0</span>
  </div>

  <div class="row">
    <div class="card income">
      Income <br>
      ₹<span id="income">0</span>
    </div>

    <div class="card expense">
      Expense <br>
      ₹<span id="expense">0</span>
    </div>
  </div>

  <input id="text" placeholder="Enter description">
  <input id="amount" type="number" placeholder="Enter amount (+income, -expense)">

  <button onclick="add()">Add Transaction</button>

  <ul id="list"></ul>
</div>

<script>
  let transactions = JSON.parse(localStorage.getItem("data")) || [];

  function add() {
    let text = document.getElementById("text").value;
    let amount = document.getElementById("amount").value;

    if (text === "" || amount === "") {
      alert("Fill both fields");
      return;
    }

    transactions.push({
      id: Date.now(),
      text: text,
      amount: Number(amount)
    });

    save();
    render();

    document.getElementById("text").value = "";
    document.getElementById("amount").value = "";
  }

  function deleteItem(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let income = 0;
    let expense = 0;

    transactions.forEach(t => {
      let li = document.createElement("li");

      if (t.amount < 0) li.classList.add("minus");

      li.innerHTML = `
        ${t.text}
        <span>₹${t.amount}</span>
        <button class="delete" onclick="deleteItem(${t.id})">X</button>
      `;

      list.appendChild(li);

      if (t.amount > 0) income += t.amount;
      else expense += Math.abs(t.amount);
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("balance").innerText = income - expense;
  }

  function save() {
    localStorage.setItem("data", JSON.stringify(transactions));
  }

  render();
</script>

</body>
</html>
