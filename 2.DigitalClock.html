<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
            transition:0.3s;
        }

        .container{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        #clock{
            font-size:60px;
            font-weight:bold;
            color:#007BFF;
            margin:20px 0;
        }

        button{
            padding:10px 20px;
            margin:10px;
            border:none;
            background:#007BFF;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        /* Dark Mode */

        .dark{
            background:#121212;
            color:white;
        }

        .dark .container{
            background:#1f1f1f;
        }

        .dark h1{
            color:white;
        }

        .dark #clock{
            color:#00ff99;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Digital Clock</h1>

        <div id="clock">00:00:00</div>

        <button onclick="toggleFormat()">
            Switch to 12-Hour Format
        </button>

        <button onclick="toggleDarkMode()">
            Dark Mode
        </button>
    </div>

    <script>

        let is24Hour = true;

        function updateClock(){

            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            let period = "";

            if(!is24Hour){

                period = hours >= 12 ? " PM" : " AM";

                hours = hours % 12;

                if(hours === 0){
                    hours = 12;
                }
            }

            hours = String(hours).padStart(2,"0");
            minutes = String(minutes).padStart(2,"0");
            seconds = String(seconds).padStart(2,"0");

            document.getElementById("clock").innerHTML =
                hours + ":" + minutes + ":" + seconds + period;
        }

        setInterval(updateClock,1000);

        updateClock();

        function toggleFormat(){

            is24Hour = !is24Hour;

            const button = document.querySelectorAll("button")[0];

            if(is24Hour){
                button.innerHTML = "Switch to 12-Hour Format";
            }
            else{
                button.innerHTML = "Switch to 24-Hour Format";
            }

            updateClock();
        }

        function toggleDarkMode(){
            document.body.classList.toggle("dark");
        }

    </script>

</body>
</html>
